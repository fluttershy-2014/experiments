<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Влюбленная Неко</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #ffe6f0; }
        canvas { display: block; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        #menu {
            pointer-events: auto; text-align: center; background: rgba(255, 255, 255, 0.95);
            padding: 40px; border-radius: 30px; box-shadow: 0 0 30px rgba(255, 105, 180, 0.6); border: 3px solid #ff4d94;
        }
        h1 { color: #ff0066; font-size: 48px; margin-bottom: 10px; }
        button {
            padding: 15px 40px; font-size: 20px; background: #ff4d94; color: white;
            border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; pointer-events: auto;
        }
        button:hover { background: #ff0066; transform: scale(1.05); }
        #timer-container {
            position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.9);
            border: 3px solid #ff0066; border-radius: 15px; padding: 10px 20px; display: none;
        }
        #timer { font-size: 32px; color: #ff0000; font-weight: bold; text-align: center; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        #ending-title { font-size: 50px; color: white; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 15px black; }
        #crosshair { width: 6px; height: 6px; border: 2px solid white; border-radius: 50%; display: none; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="menu">
            <h1>Влюбленная Неко</h1>
            <p>Неко ждёт звонка и решение своей судьбы.</p>
            <button id="start-btn">Начать игру</button>
        </div>
        <div id="timer-container">
            <div style="color: #846; font-size: 12px; font-weight: bold;">ДО ЗВОНКА:</div>
            <div id="timer">60</div>
        </div>
        <div id="crosshair"></div>
    </div>
    <div id="overlay">
        <div id="ending-text" style="color: white; font-size: 24px; margin-bottom: 10px; text-align:center;"></div>
        <div id="ending-title"></div>
        <button id="restart-btn">Играть заново</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { Reflector } from 'three/addons/objects/Reflector.js';

        let scene, camera, renderer, controls, nekoModel, timerInterval;
        let timeLeft = 60;
        let isGameOver = false;
        let keys = { w: false, a: false, s: false, d: false };
        let collidables = [];
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xfff0f5);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);

            window.addEventListener('keydown', (e) => updateKeys(e.code, true));
            window.addEventListener('keyup', (e) => updateKeys(e.code, false));
            
            window.addEventListener('mousedown', () => {
                if (!controls.isLocked && !isGameOver && document.getElementById('menu').style.display === 'none') {
                    controls.lock();
                }
            });

            window.addEventListener('blur', () => { 
                keys = { w: false, a: false, s: false, d: false }; 
            });

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffe6f0, 1);
            light.position.set(5, 10, 5);
            scene.add(light);

            createRoom();
            createNekoModel();

            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', () => location.reload());
            window.addEventListener('resize', onWindowResize);
        }

        function updateKeys(code, state) {
            if (isGameOver) return;
            if (code === 'KeyW') keys.w = state;
            if (code === 'KeyS') keys.s = state;
            if (code === 'KeyA') keys.a = state;
            if (code === 'KeyD') keys.d = state;
        }

        function createRoom() {
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), new THREE.MeshStandardMaterial({color: 0xffffff}));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            const wallMat = new THREE.MeshStandardMaterial({color: 0xffe6f0});
            [[-5,0,0, 0.2,4,10], [5,0,0, 0.2,4,10], [0,0,-5, 10,4,0.2], [0,0,5, 10,4,0.2]].forEach(p => {
                const w = new THREE.Mesh(new THREE.BoxGeometry(p[3], p[4], p[5]), wallMat);
                w.position.set(p[0], 2, p[2]);
                scene.add(w);
                collidables.push(w);
            });

            const mirror = new Reflector(new THREE.PlaneGeometry(2.5, 3.5), {
                textureWidth: window.innerWidth * window.devicePixelRatio,
                textureHeight: window.innerHeight * window.devicePixelRatio,
                color: 0x888888
            });
            mirror.position.set(0, 1.8, -4.89);
            scene.add(mirror);

            const mMat = new THREE.MeshStandardMaterial({color: 0xffccd5});
            const wardrobe = new THREE.Mesh(new THREE.BoxGeometry(1.6, 3.2, 1), mMat);
            wardrobe.position.set(-3.5, 1.6, -4);
            scene.add(wardrobe);
            collidables.push(wardrobe);

            const table = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 1.2), mMat);
            table.position.set(3, 0.8, -4);
            scene.add(table);
            collidables.push(table);
        }

       function createNekoModel() {
            nekoModel = new THREE.Group();
            
            // Материалы
            const skinMat = new THREE.MeshStandardMaterial({color: 0xffdbac, roughness: 0.8}); // Кожа
            const hairMat = new THREE.MeshStandardMaterial({color: 0x442211, roughness: 0.9}); // Каштановые волосы
            const dressMat = new THREE.MeshStandardMaterial({color: 0xff4d94, roughness: 0.6, metalness: 0.1}); // Розовое платье
            const bootMat = new THREE.MeshStandardMaterial({color: 0x222222}); // Обувь

            // --- ГОЛОВА И ВОЛОСЫ ---
            const headGroup = new THREE.Group();
            
            // Основа головы
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.18, 20, 20), skinMat);
            headGroup.add(head);

            // Прическа (челка и объем сзади)
            const hairBase = new THREE.Mesh(new THREE.SphereGeometry(0.19, 20, 20, 0, Math.PI*2, 0, Math.PI/1.6), hairMat);
            hairBase.rotation.x = Math.PI; // Поворачиваем, чтобы накрыть голову сверху
            headGroup.add(hairBase);
            
            // Челка (упрощенно)
            const bangs = new THREE.Mesh(new THREE.CylinderGeometry(0.19, 0.19, 0.05, 16, 1, true, 0, Math.PI), hairMat);
            bangs.position.y = 0.05;
            bangs.rotation.x = Math.PI / 2;
            headGroup.add(bangs);

            // Ушки
            const earGeo = new THREE.ConeGeometry(0.07, 0.16, 4);
            const el = new THREE.Mesh(earGeo, hairMat); 
            el.position.set(-0.1, 0.22, 0.02);
            el.rotation.z = 0.3;
            const er = el.clone(); 
            er.position.x = 0.1;
            er.rotation.z = -0.3;
            headGroup.add(el, er);

            headGroup.position.y = 0; // Относительно центра группы
            nekoModel.add(headGroup);


            // --- ТЕЛО (ПЛАТЬЕ) ---
            // Сделаем более выраженную форму силуэта
            const bodyGeo = new THREE.CylinderGeometry(0.08, 0.2, 0.5, 16);
            const torso = new THREE.Mesh(bodyGeo, dressMat);
            torso.position.y = -0.35;
            nekoModel.add(torso);

            // Воротничок платья
            const collar = new THREE.Mesh(new THREE.TorusGeometry(0.09, 0.015, 6, 16), new THREE.MeshStandardMaterial({color: 0xffffff}));
            collar.rotation.x = Math.PI/2;
            collar.position.y = -0.12;
            nekoModel.add(collar);


            // --- НОГИ ---
            const legGeo = new THREE.CylinderGeometry(0.05, 0.04, 0.6, 12);
            
            // Левая нога
            const lLegGroup = new THREE.Group();
            const lLeg = new THREE.Mesh(legGeo, skinMat);
            lLeg.position.y = -0.3; // Смещение самой ноги внутри группы
            lLegGroup.add(lLeg);
            
            // Ботинок
            const shoeGeo = new THREE.BoxGeometry(0.1, 0.08, 0.16);
            const lShoe = new THREE.Mesh(shoeGeo, bootMat);
            lShoe.position.set(0, -0.6, 0.03);
            lLegGroup.add(lShoe);

            lLegGroup.position.set(-0.1, -0.6, 0); // Позиция всей ноги
            nekoModel.add(lLegGroup);

            // Правая нога (клон левой)
            const rLegGroup = lLegGroup.clone();
            rLegGroup.position.x = 0.1;
            nekoModel.add(rLegGroup);


            // --- РУКИ ---
            const armGeo = new THREE.CylinderGeometry(0.035, 0.035, 0.45, 10);
            
            // Левая рука
            const lArm = new THREE.Mesh(armGeo, skinMat);
            lArm.position.set(-0.22, -0.35, 0);
            lArm.rotation.z = 0.15; // Чуть отведена
            nekoModel.add(lArm);

            // Правая рука
            const rArm = lArm.clone();
            rArm.position.x = 0.22;
            rArm.rotation.z = -0.15;
            nekoModel.add(rArm);


            // --- ХВОСТ (Добавим для полноценности Неко) ---
            const tailCurve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(0.05, -0.1, 0.1),
                new THREE.Vector3(0.15, -0.15, 0.25),
                new THREE.Vector3(0.1, -0.05, 0.35),
            ]);
            const tailGeo = new THREE.TubeGeometry(tailCurve, 20, 0.02, 8, false);
            const tail = new THREE.Mesh(tailGeo, hairMat);
            tail.position.set(0, -0.55, -0.2); // Крепим сзади
            nekoModel.add(tail);

            scene.add(nekoModel);
        }

        function startGame() {
            isGameOver = false;
            timeLeft = 60;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('timer-container').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            controls.lock();
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) { 
                    clearInterval(timerInterval); 
                    endGame(); 
                }
            }, 1000);
        }

        function endGame() {
            isGameOver = true;
            keys = { w: false, a: false, s: false, d: false };
            controls.unlock();
            
            const win = Math.random() > 0.5;
            const ov = document.getElementById('overlay');
            ov.style.display = 'flex';
            ov.style.background = win ? "rgba(255, 100, 180, 0.85)" : "rgba(20, 0, 30, 0.95)";
            document.getElementById('ending-text').innerText = win ? "Он звонит тебе и говорит, что любит тебя." : "Он говорит, что нашёл другую.";
            document.getElementById('ending-title').innerText = win ? "Вы вместе." : "Тебя бросили… ;_;";
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Если игра окончена, блокируем движение в цикле
            if (controls.isLocked && !isGameOver) {
                const delta = 0.016;
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(keys.w) - Number(keys.s);
                direction.x = Number(keys.d) - Number(keys.a);
                direction.normalize();

                if (keys.w || keys.s) velocity.z -= direction.z * 22.0 * delta;
                if (keys.a || keys.d) velocity.x += direction.x * 22.0 * delta;

                const oldPos = camera.position.clone();
                controls.moveRight(velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                for (let m of collidables) {
                    if (new THREE.Box3().setFromObject(m).expandByScalar(0.3).containsPoint(camera.position)) {
                        camera.position.copy(oldPos);
                    }
                }
                if (Math.abs(camera.position.x) > 4.7 || Math.abs(camera.position.z) > 4.7) camera.position.copy(oldPos);

                nekoModel.position.copy(camera.position);
                nekoModel.position.y -= 0.15;
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                nekoModel.position.addScaledVector(dir, -0.3);
                nekoModel.rotation.y = camera.rotation.y;
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
